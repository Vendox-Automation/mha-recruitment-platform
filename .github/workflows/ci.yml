name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: backend (django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mha
          POSTGRES_USER: mha
          POSTGRES_PASSWORD: mha
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mha -d mha"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://mha:mha@localhost:5432/mha
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_TEST_USE_DATABASE_URL: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Django system check
        run: python manage.py check
      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run
      - name: Migrate from clean database (PostgreSQL)
        run: python manage.py migrate
      - name: Tests (PostgreSQL)
        run: pytest

  frontend:
    name: frontend (next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Type check
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
